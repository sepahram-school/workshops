# ============================================
# RustFS 3-Node Cluster
# ============================================
# RustFS uses MinIO-compatible erasure coding.
# Cluster membership is configured via RUSTFS_SERVERS env var.
#
# Start with: docker compose -f docker-compose-rustfs.yml up -d
# Stop with:  docker compose -f docker-compose-rustfs.yml down -v
# ============================================

services:
  rustfs-1:
    image: docker.arvancloud.ir/rustfs/rustfs:latest
    container_name: rustfs-1
    command: server /data --console-address ":9001"
    ports:
      - "9011:9001"   # Web console
      - "9000:9000"   # S3 API
    environment:
      - RUSTFS_SERVERS=rustfs-1,rustfs-2,rustfs-3
    volumes:
      - ./data-rustfs/node1:/data
    networks:
      - rustfs-net

  rustfs-2:
    image: docker.arvancloud.ir/rustfs/rustfs:latest
    container_name: rustfs-2
    command: server /data
    environment:
      - RUSTFS_SERVERS=rustfs-1,rustfs-2,rustfs-3
    volumes:
      - ./data-rustfs/node2:/data
    networks:
      - rustfs-net

  rustfs-3:
    image: docker.arvancloud.ir/rustfs/rustfs:latest
    container_name: rustfs-3
    command: server /data
    environment:
      - RUSTFS_SERVERS=rustfs-1,rustfs-2,rustfs-3
    volumes:
      - ./data-rustfs/node3:/data
    networks:
      - rustfs-net

networks:
  rustfs-net:
    driver: bridge
